spring:
  application:
    name: library-management-system

  datasource:
    url: jdbc:postgresql://localhost:5432/library_db
    username:
    password:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml


server:
  port: 8080
  servlet:
    context-path: /api

scheduler:
  overdue-check:
    cron: {}